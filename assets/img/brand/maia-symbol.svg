<?xml version="1.0" encoding="UTF-8"?>
<!--
  Símbolo MAIA — Orquestradora
  Conceito: nó central pulsante com 7 raios apontando para 7 nós satélites (agentes mitológicos).
  Geometria: heptágono — 7 agentes ao redor de 1 orquestradora.
  Diferencia do logo principal (que é "A" letra) porque é uma SUBMARCA do sistema.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="m-grad-line" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="m-grad-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#6B21A8"/>
    </radialGradient>
    <radialGradient id="m-grad-sat" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </radialGradient>
    <filter id="m-glow-core" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="m-glow-sat" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="m-glow-soft" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Halo de fundo -->
  <circle cx="256" cy="256" r="240" fill="url(#m-grad-core)" opacity="0.08"/>

  <!-- Anel orbital sutil -->
  <circle cx="256" cy="256" r="180" stroke="#A855F7" stroke-width="1" fill="none" opacity="0.25" stroke-dasharray="3 8"/>

  <!--
    7 nós satélites em heptágono regular ao redor (raio 180)
    Ângulos: -90, -90+51.43, -90+102.86, ... (360/7)
    Posições calculadas:
    0: ( 256, 76 )       -90°
    1: ( 426, 132 )      -38.57°
    2: ( 432, 312 )      12.86°
    3: ( 326, 442 )      64.29°
    4: ( 186, 442 )      115.71° -> simétrico de 3
    5: ( 80, 312 )       167.14° -> simétrico de 2
    6: ( 86, 132 )       218.57° -> simétrico de 1
  -->

  <!-- Linhas (núcleo -> satélites) com gradiente -->
  <g stroke="url(#m-grad-line)" stroke-width="4" stroke-linecap="round" fill="none" filter="url(#m-glow-soft)" opacity="0.85">
    <line x1="256" y1="256" x2="256" y2="76"/>
    <line x1="256" y1="256" x2="426" y2="132"/>
    <line x1="256" y1="256" x2="432" y2="312"/>
    <line x1="256" y1="256" x2="326" y2="442"/>
    <line x1="256" y1="256" x2="186" y2="442"/>
    <line x1="256" y1="256" x2="80" y2="312"/>
    <line x1="256" y1="256" x2="86" y2="132"/>
  </g>

  <!-- 7 nós satélites (agentes ciano) -->
  <g filter="url(#m-glow-sat)">
    <circle cx="256" cy="76" r="16" fill="url(#m-grad-sat)"/>
    <circle cx="426" cy="132" r="16" fill="url(#m-grad-sat)"/>
    <circle cx="432" cy="312" r="16" fill="url(#m-grad-sat)"/>
    <circle cx="326" cy="442" r="16" fill="url(#m-grad-sat)"/>
    <circle cx="186" cy="442" r="16" fill="url(#m-grad-sat)"/>
    <circle cx="80" cy="312" r="16" fill="url(#m-grad-sat)"/>
    <circle cx="86" cy="132" r="16" fill="url(#m-grad-sat)"/>
  </g>

  <!-- Núcleo MAIA (centro, púrpura grande pulsante) -->
  <g filter="url(#m-glow-core)">
    <circle cx="256" cy="256" r="42" fill="url(#m-grad-core)"/>
    <!-- M central em branco/transparente para dar carácter -->
    <text x="256" y="276" text-anchor="middle" font-family="'Geist', 'Inter', sans-serif" font-weight="800" font-size="42" fill="#FFFFFF" opacity="0.95">M</text>
  </g>
</svg>
